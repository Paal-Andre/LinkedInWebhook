name: Azure Deploy Static Web App

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/azure-deploy-static-webapp.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-linkedin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve app name
        id: naming
        shell: bash
        run: |
          if [ -n "${{ vars.AZURE_STATIC_WEBAPP_NAME }}" ]; then
            echo "name=${{ vars.AZURE_STATIC_WEBAPP_NAME }}" >> "$GITHUB_OUTPUT"
          else
            REPO_SLUG="${GITHUB_REPOSITORY##*/}"
            SAFE="$(echo "$REPO_SLUG" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
            echo "name=${SAFE}-swa" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch deployment token from Azure
        id: token
        shell: bash
        run: |
          TOKEN="$(az staticwebapp secrets list --name "${{ steps.naming.outputs.name }}" --resource-group "$RESOURCE_GROUP" --query properties.apiKey -o tsv)"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy web folder
        shell: bash
        run: |
          npx @azure/static-web-apps-cli deploy web --deployment-token "${{ steps.token.outputs.token }}" --env production
