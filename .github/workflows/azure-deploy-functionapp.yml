name: Azure Deploy Function App

on:
  push:
    branches:
      - main
    paths:
      - linkedin-function-app/**
      - .github/workflows/azure-deploy-functionapp.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  RESOURCE_GROUP: rg-linkedin
  ACTIVE_SUBSCRIPTION_ID: 8f7632eb-3eca-4579-885f-187540753d20
  ACTIVE_TENANT_ID: e7b931d0-cec1-4377-a051-e243b7561b40
  ACTIVE_CLIENT_ID: 7f36c4b1-281f-4e8c-bf99-f5cd3c236ee3


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate function app name
        shell: bash
        run: |
          if [ -z "$FUNCTIONAPP_NAME" ]; then
            FUNCTIONAPP_NAME="func-linkedin-ie0tz6"
          fi
          echo "FUNCTIONAPP_NAME=$FUNCTIONAPP_NAME" >> "$GITHUB_ENV"
          echo "Using Function App: $FUNCTIONAPP_NAME"

      - name: Azure login via OIDC (no external action)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$ACTIVE_CLIENT_ID" ]; then
            echo "Missing ACTIVE_CLIENT_ID" >&2
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange")
          OIDC_TOKEN=$(python3 -c 'import sys, json; print(json.load(sys.stdin)["value"])' <<< "$TOKEN_RESPONSE")

          az login --service-principal -u "$ACTIVE_CLIENT_ID" -t "$ACTIVE_TENANT_ID" --federated-token "$OIDC_TOKEN" --allow-no-subscriptions 1>/dev/null

          echo "Accessible subscriptions for OIDC identity:" 
          az account list --query "[].{name:name,id:id,tenantId:tenantId}" -o table

          if ! az account show --subscription "$ACTIVE_SUBSCRIPTION_ID" --output none 2>/dev/null; then
            echo "Target subscription '$ACTIVE_SUBSCRIPTION_ID' is NOT accessible for this OIDC identity in tenant '$ACTIVE_TENANT_ID'." >&2
            echo "Fix by granting this service principal access to the target subscription/resource group, or update AZURE_CLIENT_ID to the correct app registration." >&2
            exit 1
          fi

          az account set --subscription "$ACTIVE_SUBSCRIPTION_ID"
          echo "Using subscription: $ACTIVE_SUBSCRIPTION_ID"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          cd linkedin-function-app
          npm ci

      - name: Deploy Function App with zip deploy
        shell: bash
        run: |
          set -euo pipefail
          cd linkedin-function-app
          zip -r ../functionapp.zip . -x "node_modules/*" "local.settings.json"

          az functionapp deployment source config-zip \
            --subscription "$ACTIVE_SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTIONAPP_NAME" \
            --src ../functionapp.zip \
            --output none
